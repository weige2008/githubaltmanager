# GitHub Alt Manager - Nginx 反向代理配置
# 将本文件放到 /etc/nginx/sites-available/ 然后 ln -s 到 sites-enabled/

server {
    listen 80;
    # listen 443 ssl http2;       # 启用 HTTPS 时取消注释并配置证书
    # server_name gam.example.com;

    # ssl_certificate     /etc/letsencrypt/live/gam.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/gam.example.com/privkey.pem;

    # 上传文件大小（修改仓库文件时）
    client_max_body_size 20m;

    # 前端静态资源
    root /opt/githubaltmanager/frontend/dist;
    index index.html;

    # 前端 SPA 路由
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理到后端 Go 服务
    location /api/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # 健康检查
    location = /healthz {
        proxy_pass http://127.0.0.1:8080/healthz;
    }

    # 静态资源缓存
    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # 安全头
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
}
