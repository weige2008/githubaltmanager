services:
  githubaltmanager:
    build: .
    image: githubaltmanager:latest
    container_name: gam
    ports:
      - "8080:8080"
    volumes:
      - gam-data:/app/data
    environment:
      - GAM_JWT_SECRET=${GAM_JWT_SECRET:-}
      - GAM_MASTER_SALT=${GAM_MASTER_SALT:-}
    restart: unless-stopped

volumes:
  gam-data:
